<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teste Resend - Brio App</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      max-width: 600px;
      width: 100%;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 16px;
      padding: 40px;
    }
    
    h1 {
      color: #22c55e;
      margin-bottom: 10px;
      font-size: 28px;
    }
    
    p {
      color: #888;
      margin-bottom: 30px;
      line-height: 1.6;
    }
    
    .input-group {
      margin-bottom: 20px;
    }
    
    label {
      display: block;
      color: #aaa;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 500;
    }
    
    input {
      width: 100%;
      padding: 12px 16px;
      background: #0a0a0a;
      border: 1px solid #333;
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      font-family: 'Courier New', monospace;
    }
    
    input:focus {
      outline: none;
      border-color: #22c55e;
    }
    
    button {
      width: 100%;
      padding: 14px;
      background: #22c55e;
      color: #000;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    button:hover {
      background: #16a34a;
      transform: translateY(-2px);
    }
    
    button:active {
      transform: translateY(0);
    }
    
    button:disabled {
      background: #333;
      color: #666;
      cursor: not-allowed;
      transform: none;
    }
    
    .result {
      margin-top: 30px;
      padding: 20px;
      background: #0a0a0a;
      border: 1px solid #333;
      border-radius: 8px;
      display: none;
    }
    
    .result.success {
      display: block;
      border-color: #22c55e;
    }
    
    .result.error {
      display: block;
      border-color: #ef4444;
    }
    
    .result h3 {
      margin-bottom: 10px;
      font-size: 18px;
    }
    
    .result.success h3 {
      color: #22c55e;
    }
    
    .result.error h3 {
      color: #ef4444;
    }
    
    .result pre {
      background: #000;
      padding: 15px;
      border-radius: 6px;
      overflow-x: auto;
      font-size: 12px;
      color: #aaa;
      margin-top: 10px;
    }
    
    .warning {
      background: #fef3c7;
      color: #92400e;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      border: 1px solid #fbbf24;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚀 Teste Resend + Brio App</h1>
    <p>Valide a integração entre Resend e o domínio brioapp.online</p>
    
    <div class="warning">
      ⚠️ <strong>Atenção:</strong> Este teste faz uma chamada direta à API do Resend. Não use em produção (exponha a API Key).
    </div>
    
    <div class="input-group">
      <label for="apiKey">API Key do Resend</label>
      <input 
        type="password" 
        id="apiKey" 
        placeholder="re_..." 
        value=""
      />
    </div>
    
    <div class="input-group">
      <label for="email">Email de Destino</label>
      <input 
        type="email" 
        id="email" 
        placeholder="seu-email@exemplo.com" 
        value="zanattaguilherme12@gmail.com"
      />
    </div>
    
    <button id="sendBtn" onclick="sendTestEmail()">
      Enviar Email de Teste
    </button>
    
    <div id="result" class="result"></div>
  </div>
  
  <script>
    async function sendTestEmail() {
      const apiKey = document.getElementById('apiKey').value.trim();
      const email = document.getElementById('email').value.trim();
      const resultDiv = document.getElementById('result');
      const sendBtn = document.getElementById('sendBtn');
      
      // Validação
      if (!apiKey) {
        alert('Por favor, insira a API Key do Resend');
        return;
      }
      
      if (!email) {
        alert('Por favor, insira um email de destino');
        return;
      }
      
      // Desabilitar botão
      sendBtn.disabled = true;
      sendBtn.textContent = 'Enviando...';
      resultDiv.className = 'result';
      resultDiv.style.display = 'none';
      
      try {
        const response = await fetch('https://api.resend.com/emails', {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${apiKey}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            from: 'Brio App <team@brioapp.online>',
            to: [email],
            subject: 'Sinal Verde: Brio App está Online! 🚀',
            html: `
              <div style="background: #000; color: #fff; padding: 30px; border-radius: 15px; font-family: sans-serif; border: 1px solid #22c55e;">
                <h1 style="color: #22c55e;">BRiO APP</h1>
                <p>Olá, Comandante Zanatta!</p>
                <p>Este é um teste oficial de integração. Se você recebeu isso, a ponte entre <strong>Supabase + Resend + Hostinger</strong> está operando em 100%.</p>
                <hr style="border: 1px solid #333; margin: 20px 0;" />
                <h2 style="color: #22c55e;">✅ Status da Integração</h2>
                <ul style="line-height: 1.8;">
                  <li>✅ Domínio brioapp.online verificado</li>
                  <li>✅ API Key do Resend configurada</li>
                  <li>✅ Edge Functions deployadas</li>
                  <li>✅ Sistema de convites funcionando</li>
                </ul>
                <hr style="border: 1px solid #333; margin: 20px 0;" />
                <p style="color: #666; font-size: 12px; margin-top: 20px;">
                  © 2026 Black Sheep Tech. Todos os direitos reservados.
                </p>
              </div>
            `
          })
        });
        
        const data = await response.json();
        
        if (!response.ok) {
          throw new Error(JSON.stringify(data, null, 2));
        }
        
        // Sucesso
        resultDiv.className = 'result success';
        resultDiv.innerHTML = `
          <h3>✅ Email enviado com sucesso!</h3>
          <p style="color: #aaa; margin-top: 10px;">
            ID do email: <strong>${data.id}</strong>
          </p>
          <p style="color: #aaa; margin-top: 10px;">
            Verifique sua caixa de entrada em: <strong>${email}</strong>
          </p>
          <p style="color: #888; font-size: 12px; margin-top: 15px;">
            Se não estiver na caixa principal, verifique o SPAM. Domínios novos podem ser filtrados inicialmente.
          </p>
          <pre>${JSON.stringify(data, null, 2)}</pre>
        `;
        
      } catch (error) {
        // Erro
        resultDiv.className = 'result error';
        resultDiv.innerHTML = `
          <h3>❌ Erro ao enviar email</h3>
          <p style="color: #aaa; margin-top: 10px;">
            Verifique se a API Key está correta e se o domínio brioapp.online está verificado no Resend.
          </p>
          <pre>${error.message}</pre>
        `;
      } finally {
        // Reabilitar botão
        sendBtn.disabled = false;
        sendBtn.textContent = 'Enviar Email de Teste';
      }
    }
  </script>
</body>
</html>
